<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PNU CollaboratED</title>
    <script>
      // Suppress benign Vite WebSocket errors that occur because HMR is disabled by the platform.
      window.addEventListener('unhandledrejection', (event) => {
        if (event.reason && (
          (event.reason.message && (
            event.reason.message.includes('WebSocket closed without opened') ||
            event.reason.message.includes('failed to connect to websocket')
          )) ||
          (typeof event.reason === 'string' && (
            event.reason.includes('WebSocket closed without opened') ||
            event.reason.includes('failed to connect to websocket')
          ))
        )) {
          event.preventDefault();
        }
      });
      
      const originalError = console.error;
      console.error = (...args) => {
        if (args[0] && typeof args[0] === 'string' && (
          args[0].includes('[vite] failed to connect to websocket') ||
          args[0].includes('WebSocket closed without opened')
        )) {
          return;
        }
        originalError.apply(console, args);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
